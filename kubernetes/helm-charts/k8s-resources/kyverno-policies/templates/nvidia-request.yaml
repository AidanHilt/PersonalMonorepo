apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-nvidia-direct-access
  annotations:
    policies.kyverno.io/title: Block Direct NVIDIA GPU Access
    policies.kyverno.io/description: >
      Blocks pods and pod-creating resources from directly requesting GPU access
      via NVIDIA_VISIBLE_DEVICES env vars or the nvidia RuntimeClass, unless the
      pod has a resource limit of 1 for nvidia.com/gpu.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: block-nvidia-runtimeclass
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - ReplicaSet
      validate:
        message: "Using the 'nvidia' RuntimeClass directly is not permitted unless nvidia.com/gpu: 1 is set in resource limits."
        deny:
          conditions:
            all:
              - key: "{{ `{{ request.object.spec.runtimeClassName || request.object.spec.template.spec.runtimeClassName || '' }}` }}"
                operator: Equals
                value: nvidia
              - key: '{{ `{{ request.object.spec.containers[].resources.limits."nvidia.com/gpu" | to_array(@) | [?@ == ''1''] | length(@) }}` }}'
                operator: Equals
                value: "0"
              - key: '{{ `{{ request.object.spec.template.spec.containers[].resources.limits."nvidia.com/gpu" | to_array(@) | [?@ == ''1''] | length(@) }}` }}'
                operator: Equals
                value: "0"

    - name: block-nvidia-visible-devices-env
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - ReplicaSet
      validate:
        message: "Setting NVIDIA_VISIBLE_DEVICES is not permitted unless nvidia.com/gpu: 1 is set in resource limits."
        deny:
          conditions:
            all:
              - key: "{{ `{{ request.object.spec.containers[].env[].name || request.object.spec.template.spec.containers[].env[].name || '' }}` }}"
                operator: AnyIn
                value: ["NVIDIA_VISIBLE_DEVICES"]
              - key: '{{ `{{ request.object.spec.containers[].resources.limits."nvidia.com/gpu" | to_array(@) | [?@ == ''1''] | length(@) }}` }}'
                operator: Equals
                value: "0"
              - key: '{{ `{{ request.object.spec.template.spec.containers[].resources.limits."nvidia.com/gpu" | to_array(@) | [?@ == ''1''] | length(@) }}` }}'
                operator: Equals
                value: "0"
