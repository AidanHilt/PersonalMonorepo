gfd:
  enabled: true

nvidiaDriverRoot: /run/opengl-driver/lib

cdi:
  nvidiaHookPath: /usr/bin/nvidia-ctk

config:
  map:
    default: |-
      version: v1
      flags:
        migStrategy: none
      plugin:
        deviceListStrategy: "cdi-cri"
        deviceIDStrategy: "uuid"
        passDeviceSpecs: false
