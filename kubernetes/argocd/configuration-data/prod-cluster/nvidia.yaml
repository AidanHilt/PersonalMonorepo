gfd:
  enabled: true

runtimeClassName: nvidia

nvidiaDriverRoot: /run/opengl-driver/lib

cdi:
  nvidiaHookPath: /usr/bin/nvidia-ctk

config:
  map:
    default: |-
      version: v1
      flags:
        migStrategy: none
        nvidiaDriverRoot: /run/opengl-driver/lib
        nvidiaDevRoot: /dev
        plugin:
          deviceListStrategy: "cdi-cri"
          deviceIDStrategy: "uuid"
          nvidiaCTKPath: /usr/bin/nvidia-ctk
          passDeviceSpecs: true
